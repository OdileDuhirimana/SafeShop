services:
  - type: web
    name: safeshop-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install --omit=dev
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: MONGO_URI
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: API_PUBLIC_URL
        sync: false
      - key: AI_URL
        sync: false
      - key: AES_KEY
        sync: false
      - key: STRIPE_SECRET
        sync: false
      - key: TAX_RATE
        value: "0.1"
      - key: BASE_CURRENCY
        value: USD

  - type: web
    name: safeshop-ai
    runtime: docker
    plan: free
    dockerContext: .
    dockerfilePath: ./ai/Dockerfile
    healthCheckPath: /health
    envVars:
      - key: CORS_ALLOW_ORIGINS
        sync: false
